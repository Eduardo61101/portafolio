<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Deportes - Modo Arcade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e8f5e9 0%, #cfd8dc 100%);
            color: #2e7d32;
        }

        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-sizing: border-box;
            border: 1px solid #c8e6c9;
            position: relative;
        }

        h2 {
            color: #1b5e20;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 26px;
        }

        p {
            color: #558b2f;
            font-size: 16px;
        }

        .menu-categorias {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-categoria {
            background-color: #f1f8e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }

        .btn-categoria:hover {
            background-color: #2e7d32;
            color: white;
            transform: translateY(-2px);
        }

        #btn-verificar {
            background-color: #2e7d32;
            color: white;
            width: 100%;
        }

        #btn-verificar:hover {
            background-color: #1b5e20;
            transform: translateY(-2px);
        }

        #btn-saltar {
            background-color: #78909c;
            color: white;
            width: 100%;
        }

        #btn-saltar:hover {
            background-color: #607d8b;
            transform: translateY(-2px);
        }

        /* Marcadores visuales de Vidas y Puntos */
        .vidas-container {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .puntos-container {
            font-size: 18px;
            color: #1b5e20;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .input-group {
            margin: 25px 0;
        }

        input {
            padding: 14px;
            font-size: 16px;
            font-family: inherit;
            border: 2px solid #a5d6a7;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            background-color: #fafafa;
            color: #1b5e20;
            text-align: center;
        }

        input:focus {
            border-color: #2e7d32;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(46, 125, 50, 0.2);
            outline: none;
        }

        .hidden {
            display: none;
        }

        .resultado {
            margin-top: 25px;
            font-weight: bold;
            font-size: 18px;
            padding: 12px;
            border-radius: 8px;
        }

        .correcto { 
            color: #1b5e20; 
            background-color: #e8f5e9;
            border: 1px solid #a5d6a7;
        }

        .incorrecto { 
            color: #c62828; 
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
        }

        .btn-regresar {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ffffff;
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #a5d6a7;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .btn-regresar:hover {
            background-color: #e8f5e9;
            color: #1b5e20;
            transform: translateX(-3px);
            box-shadow: 0 6px 12px rgba(46, 125, 50, 0.1);
        }
    </style>
</head>
<body>

<a href="inicio.html" class="btn-regresar">⬅ Regresar</a>

<div class="container">
    
    <!-- Menú de Selección -->
    <div id="pantalla-menu">
        <h2>💖 Trivia de Deportes - Modo Arcade</h2>
        <p>Empiezas con 3 vidas. Cada error te quitará un corazón.<br>¡Intenta llegar lo más lejos posible sin perder!</p>
        <p>Selecciona una disciplina deportiva:</p>
        
        <div class="menu-categorias">
            <button class="btn-categoria" onclick="comenzarJuego('futbol')">⚽ Fútbol</button>
            <button class="btn-categoria" onclick="comenzarJuego('basquetbol')">🏀 Básquetbol</button>
            <button class="btn-categoria" onclick="comenzarJuego('beisbol')">⚾ Béisbol</button>
            <button class="btn-categoria" onclick="comenzarJuego('tenis')">🎾 Tenis</button>
            <button class="btn-categoria" onclick="comenzarJuego('boxeo')">🥊 Boxeo</button>
            <button class="btn-categoria" onclick="comenzarJuego('atletismo')">🏃 Atletismo</button>
            <button class="btn-categoria" style="grid-column: span 2;" onclick="comenzarJuego('automovilismo')">🏎️ Automovilismo</button>
           <button class="btn-categoria" style="grid-column: span 2;" onclick="comenzarJuego('voleibol')">🏐 Voleibol</button>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="pantalla-juego" class="hidden">
        <div id="marcador-vidas" class="vidas-container">💖 💖 💖</div>
        <div class="puntos-container">Puntuación: <span id="marcador-puntos">0</span></div>
        
        <h2 id="pregunta-texto">Pregunta</h2>
        
        <div class="quiz-box">
            <div class="input-group">
                <input type="text" id="input-respuesta" placeholder="Escribe tu respuesta aquí" autocomplete="off">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="btn-verificar" onclick="evaluarRespuesta()">Verificar</button>
                <button id="btn-saltar" onclick="saltarPregunta()">Saltar (Sin penalización)</button>
            </div>
            <div id="resultado-feedback" class="resultado hidden"></div>
        </div>
    </div>

    <!-- Pantalla de Fin de Juego -->
    <div id="pantalla-fin" class="hidden">
        <h2>❌ ¡Game Over!</h2>
        <p>Te has quedado sin vidas disponibles.</p>
        <div class="resultado incorrecto" style="font-size: 22px; margin-bottom: 25px;">
            Puntuación Final: <strong id="total-puntos" style="font-size: 28px;">0</strong>
        </div>
        <button id="btn-verificar" onclick="regresarAlMenu()">Volver al Menú</button>
    </div>

</div>

<script>
    // Base de datos con los 7 deportes solicitados
    const basePreguntas = {
        futbol: [
            { pista: '¿quien era el arquero de argentina campeon del mundo 1986?', respuesta:"nery pumpido"},
            { pista: '¿quien era la seleccion revelacion del mundial de 1966?', respuesta:"corea del norte"},
            { pista: '¿quien fue el campeon de la champions de 2005-2006?', respuesta:"barcelona"},
            { pista: '¿cual fue el primer club aleman historico en decender a la 2da division?', respuesta:"hamburgo"},
            { pista: '¿cual es el mejor club de mexico historicamente (SIN rivalidad ni favoritismo)?', respuesta:"america"},
            { pista: '¿De qué color es la tarjeta que expulsa a un jugador del partido?', respuesta: "roja" },
            { pista: '¿Cuántos jugadores de un mismo equipo entran a la cancha al inicio?', respuesta: "11" },
            { pista: '¿Cada cuántos años se juega el Mundial de la FIFA?', respuesta: "4" },
            { pista: 'País que ha ganado más Copas del Mundo en la historia', respuesta: "brasil" }
        ],
        basquetbol: [
            { pista: '¿Cuántos puntos vale una canasta anotada desde atrás de la línea más lejana?', respuesta: "3" },
            { pista: '¿Cómo se llama la liga de básquetbol profesional más famosa del mundo (EE.UU.)?', respuesta: "nba" },
            { pista: 'Apellido del legendario jugador número 23 de los Chicago Bulls (Michael...)', respuesta: "jordan" },
            { pista: '¿Cuántos jugadores por equipo están dentro de la duela jugando?', respuesta: "5" }
        ],
        beisbol: [
            { pista: '¿Cuántos strikes se necesitan para que un bateador quede fuera (out)?', respuesta: "3" },
            { pista: '¿Cómo se llama la anotación que ocurre cuando la pelota sale del estadio de un batazo?', respuesta: "home run" },
            { pista: '¿Cuántas bases totales debe recorrer un jugador para anotar una carrera?', respuesta: "4" },
            { pista: 'Posición del jugador encargado de lanzar la bola hacia el bateador', respuesta: "pitcher" }
        ],
        tenis: [
            { pista: '¿Cómo se llama el accesorio con red que usan los jugadores para golpear la pelota?', respuesta: "raqueta" },
            { pista: '¿Qué famoso torneo de Grand Slam se juega sobre una superficie de césped tradicional?', respuesta: "wimbledon" },
            { pista: '¿Cuántos jugadores participan en un partido de la modalidad "singles"?', respuesta: "2" },
            { pista: '¿De qué color son normalmente las pelotas oficiales en los torneos?', respuesta: "amarilla" }
        ],
        boxeo: [
            { pista: '¿Cómo se le llama al piso o escenario cuadrado donde pelean los boxeadores?', respuesta: "ring" },
            { pista: 'Accesorio obligatorio acolchado que se usa en las manos para golpear', respuesta: "guantes" },
            { pista: 'Siglas que significan que un boxeador cae y ya no puede levantarse (Knockout)', respuesta: "ko" },
            { pista: '¿Cómo se le llama a cada uno de los periodos de tiempo o rounds de una pelea?', respuesta: "asalto" }
        ],
        atletismo: [
            { pista: '¿Cuántos metros recorre un atleta en la prueba de velocidad pura más famosa?', respuesta: "100" },
            { pista: 'Objeto cilíndrico que los corredores se van pasando unos a otros en las carreras de relevos', respuesta: "estafeta" },
            { pista: 'Apellido del corredor jamaiquino considerado el hombre más rápido de la historia (Usain...)', respuesta: "bolt" },
            { pista: '¿Qué medalla recibe el atleta que llega en primer lugar?', respuesta: "oro" }
        ],
        automovilismo: [
            { pista: '¿Cómo se llama la categoría reina del automovilismo mundial (Fórmula...) ?', respuesta: "1" },
            { pista: 'Color de la bandera que se ondea para indicar que la carrera ha terminado', respuesta: "cuadros" },
            { pista: 'Lugar de los boxes donde el coche entra a cambiar llantas muy rápido', respuesta: "pits" },
            { pista: '¿Cómo se le llama al conductor encargado de pilotar el coche de carreras?', respuesta: "piloto" }
        ],
            voleibol: [
            { pista: '¿Cuántos jugadores por equipo entran a la cancha a jugar un partido oficial?', respuesta: "6" },
            { pista: '¿Cómo se llama la red alta que divide la cancha a la mitad?', respuesta: "malla" },
            { pista: '¿Cuál es el número máximo de toques que puede dar un equipo antes de pasar el balón?', respuesta: "3" },
            { pista: '¿Cómo se llama la acción de saltar junto a la malla para golpear con fuerza el balón hacia abajo?', respuesta: "remate" }
        ]
    };

    let preguntasActuales = [];
    let indicePregunta = 0;
    let puntos = 0;
    let vidas = 3;

    const elInput = document.getElementById('input-respuesta');
    const elFeedback = document.getElementById('resultado-feedback');

    elInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') evaluarRespuesta();
    });

    function normalizarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").trim();
    }

    function comenzarJuego(categoria) {
        preguntasActuales = [...basePreguntas[categoria]].sort(() => Math.random() - 0.5);
        indicePregunta = 0;
        puntos = 0;
        vidas = 3;
        
        actualizarVidasVisuales();
        document.getElementById('marcador-puntos').textContent = puntos;
        elFeedback.classList.add('hidden');

        document.getElementById('pantalla-menu').classList.add('hidden');
        document.getElementById('pantalla-juego').classList.remove('hidden');
        
        desplegarPregunta();
    }

    function desplegarPregunta() {
        elInput.value = "";
        elInput.focus();
        
        if (indicePregunta >= preguntasActuales.length) {
            preguntasActuales.sort(() => Math.random() - 0.5);
            indicePregunta = 0;
        }

        document.getElementById('pregunta-texto').textContent = preguntasActuales[indicePregunta].pista;
    }

    function evaluarRespuesta() {
        const respuestaUsuario = normalizarTexto(elInput.value);
        const respuestaCorrecta = preguntasActuales[indicePregunta].respuesta;

        if (!respuestaUsuario) return;

        if (respuestaUsuario === respuestaCorrecta) {
            puntos += 10;
            document.getElementById('marcador-puntos').textContent = puntos;
            mostrarFeedback("¡Correcto! +10 puntos", "correcto");
            indicePregunta++;
            setTimeout(desplegarPregunta, 600);
        } else {
            vidas--;
            actualizarVidasVisuales();
            
            if (vidas <= 0) {
                finalizarJuego();
            } else {
                mostrarFeedback("Incorrecto. Pierdes una vida", "incorrecto");
                elInput.value = "";
                elInput.focus();
            }
        }
    }

    function saltarPregunta() {
        mostrarFeedback(`Te saltaste la pregunta. Era: ${preguntasActuales[indicePregunta].respuesta.toUpperCase()}`, "incorrecto");
        indicePregunta++;
        setTimeout(desplegarPregunta, 1000);
    }

    function actualizarVidasVisuales() {
        let corazones = "";
        for (let i = 0; i < vidas; i++) {
            corzanos = corazones += "💖 ";
        }
        if(vidas === 0) corazones = "💀";
        document.getElementById('marcador-vidas').textContent = corazones;
    }

    function mostrarFeedback(texto, clase) {
        elFeedback.textContent = texto;
        elFeedback.className = `resultado ${clase}`;
        elFeedback.classList.remove('hidden');
        if (clase === "correcto") {
            setTimeout(() => elFeedback.classList.add('hidden'), 600);
        }
    }

    function finalizarJuego() {
        document.getElementById('total-puntos').textContent = puntos;
        document.getElementById('pantalla-juego').classList.add('hidden');
        document.getElementById('pantalla-fin').classList.remove('hidden');
    }

    function regresarAlMenu() {
        document.getElementById('pantalla-fin').classList.add('hidden');
        document.getElementById('pantalla-menu').classList.remove('hidden');
    }
</script>
</body>
</html>
