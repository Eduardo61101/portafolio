    function normalizarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").trim();
    }

    function inicializarListaEstudio() {
        listaContenedor.innerHTML = "";
        datosGeo.forEach(item => {
            const div = document.createElement('div');
            div.className = 'elemento-item';
            const capBonita = item.capital.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
            div.textContent = `${item.numero}. ${item.pais} ➔ ${capBonita}`;
            listaContenedor.appendChild(div);
        });
    }

        btnSaltar.style.display = "inline-block";

                               porcentajeAprendizaje >= 40 ? "Regular" : "Reprobado";

                             porcentajeAprendizaje >= 51 ? "#ffc107" : 
                             porcentajeAprendizaje >= 40 ? "#ef6c00" : "#dc3545";

            btnVerificar.style.display = "none";
            btnSaltar.style.display = "none";
            return;

            porcentajeAprendizaje += 10;
            btnVerificar.style.display = "none";
            btnSaltar.style.display = "none";
            btnOtro.classList.remove('hidden');
            indiceActual++;
        } else {
            fallosActuales++;
            porcentajeAprendizaje -= 5;
            if (fallosActuales >= 3) {
                porcentajeAprendizaje -= 10;
                const capBonita = itemActual.capital.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
                resultado.textContent = `Fallaste 3 veces. La respuesta correcta era: ${capBonita}.`;
                resultado.className = "resultado incorrecto";
                btnVerificar.style.display = "none";
                btnSaltar.style.display = "none";
                btnOtro.classList.remove('hidden');
                indiceActual++;
            } else {
                resultado.textContent = `Respuesta incorrecta. Intento ${fallosActuales} de 3.`;
                resultado.className = "resultado incorrecto";
            }
        }
    });

    btnSaltar.addEventListener('click', () => {
        const itemActual = datosGeo[indiceActual];
        porcentajeAprendizaje -= 5;
        const capBonita = itemActual.capital.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
        resultado.textContent = `Te saltaste la pregunta. La capital de ${itemActual.pais} es ${capBonita}.`;
        resultado.className = "resultado incorrecto";
        btnVerificar.style.display = "none";
        btnSaltar.style.display = "none";
        btnOtro.classList.remove('hidden');
        indiceActual++;
    });

    btnOtro.addEventListener('click', cargarPreguntaConsecutiva);
</script>
</body>
</html>
